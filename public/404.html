<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Wealth Manager</title>
  <script>
    // GitHub Pages SPA routing: redirect 404s back to index.html
    // preserving the path as a query parameter for main.tsx to handle
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin +
      '/wealth-manager/?p=' +
      encodeURIComponent(path.replace('/wealth-manager', '') + search + hash)
    );
  </script>
</head>
<body></body>
</html>
